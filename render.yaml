    buildCommand: npm install && cd apps/api && npm run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_1p9njZmMwEGo@ep-sweet-band-aof3vdri-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        value: "https://booking-hotel-api.onrender.com"
      - key: FRONTEND_URL
        value: "https://booking-hotel-web.vercel.app"
      - key: PORT
        value: "3000"
