services:
  - type: web
    name: booking-hotel-api
    env: node
    buildCommand: npm install && cd apps/api && npm run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
